name: build-and-verify-pkg-apps

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "apps/**"
      - "scripts/**"
      - ".github/workflows/build-and-verify-pkg-apps.yml"
      - ".github/workflows/build-and-verify-pkg.yml"
  pull_request:
    paths:
      - "apps/**"
      - "scripts/**"
      - ".github/workflows/build-and-verify-pkg-apps.yml"
      - ".github/workflows/build-and-verify-pkg.yml"

permissions:
  contents: read

concurrency:
  group: build-and-verify-pkg-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-affected-apps:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.collect.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: collect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # On manual/push-to-default-branch, run everything.
          # On PR / branch push, only run for the apps whose YAML or per-app
          # script directory changed; if scripts/core/** changed, run all.
          all_apps=$(for f in apps/*.yml; do [[ -e "$f" ]] || continue; basename "$f" .yml; done | sort -u)
          run_all=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then run_all=true; fi
          if [[ "$EVENT_NAME" == "push" && "$REF" =~ ^refs/heads/(master|main)$ ]]; then run_all=true; fi

          if $run_all; then
            apps="$all_apps"
          else
            base="${BASE_SHA:-$BEFORE_SHA}"
            head="${HEAD_SHA:-$AFTER_SHA}"
            changed=$(git diff --name-only "$base" "$head" 2>/dev/null || true)
            echo "Changed files:"; echo "$changed"
            if echo "$changed" | grep -qE '^scripts/core/'; then
              apps="$all_apps"
            else
              apps=$(echo "$changed" | awk -F/ '
                /^apps\// && /\.yml$/ { sub(/^apps\//,""); sub(/\.yml$/,""); print }
                /^scripts\/apps\// { print $3 }
              ' | sort -u)
            fi
          fi
          # Emit a JSON array (empty array if nothing matched — drops blank lines).
          json=$(printf '%s\n' "$apps" | awk 'NF' | jq -R . | jq -s -c .)
          [[ -z "$json" ]] && json='[]'
          echo "apps=$json" >> "$GITHUB_OUTPUT"
          echo "selected apps: $json"

  build-and-verify:
    needs: detect-affected-apps
    if: needs.detect-affected-apps.outputs.apps != '[]' && needs.detect-affected-apps.outputs.apps != ''
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.detect-affected-apps.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Show env
        run: |
          sw_vers && uname -m
          yq --version

      - name: Run build-and-verify
        env:
          APP: ${{ matrix.app }}
        run: |
          chmod +x scripts/core/build-and-verify.sh
          ./scripts/core/build-and-verify.sh "apps/${APP}.yml"

      - name: Upload pkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-pkg-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/jamf-pkg-builder/artifacts/${{ matrix.app }}.pkg
            ${{ runner.temp }}/jamf-pkg-builder/artifacts/${{ matrix.app }}-build-and-verify.log
          # script_based モードの app は .pkg を作らないので warn → ignore に下げる
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload EA script artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-ea-${{ github.run_number }}
          path: ${{ runner.temp }}/jamf-pkg-builder/artifacts/${{ matrix.app }}-ea.sh
          if-no-files-found: warn
          retention-days: 7
