name: lint

on:
  push:
    branches: [master, main]
    paths:
      - "apps/**"
      - "scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "apps/**"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck >/dev/null
          # SC1091: don't try to follow sourced files; SC2155: declare and assign on same line is fine here.
          find scripts -type f -name '*.sh' -print0 | xargs -0 shellcheck -x -e SC1091,SC2155

  apps-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Validate apps/*.yml schema
        run: bash scripts/check-apps-schema.sh

  choice-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Check workflow choice options match apps/*.yml
        run: bash scripts/check-choice-list.sh

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker://rhysd/actionlint:latest
        with:
          args: -color
