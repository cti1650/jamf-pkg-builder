name: Google Chrome

download:
  url: https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg
  file: googlechrome.dmg

installer:
  type: dmg
  app_name: Google Chrome.app
  repackage: true

detect:
  app_path: /Applications/Google Chrome.app
  min_version: "120.0"

uninstall:
  type: script
  script: scripts/apps/google-chrome/uninstall.sh

extension_attribute:
  script: scripts/apps/google-chrome/ea.sh
