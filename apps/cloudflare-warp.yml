name: Cloudflare WARP

download:
  # Canonical latest-PKG endpoint; redirects to the versioned URL under downloads.cloudflareclient.com.
  url: https://downloads.cloudflareclient.com/v1/download/macos/ga
  file: Cloudflare_WARP.pkg

installer:
  type: pkg
  repackage: false

detect:
  # ea_script is the primary check (warp-cli state can differ from .app presence),
  # but app_path is also supplied so the CI can run step 8 (arch check) and step 11 (removal check).
  ea_script: scripts/apps/cloudflare-warp/detect.sh
  app_path: /Applications/Cloudflare WARP.app

uninstall:
  type: script
  script: scripts/apps/cloudflare-warp/uninstall.sh

extension_attribute:
  script: scripts/apps/cloudflare-warp/ea.sh
